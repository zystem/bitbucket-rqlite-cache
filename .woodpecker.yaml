steps:
  build:
    image: nimlang/nim:2.2.4-alpine
    commands:
      - apk add --no-cache gcc musl-dev openssl-dev pcre-dev git
      - git config --global --add safe.directory "$CI_WORKSPACE"
      - nimble install -y https://github.com/zystem/nim-posixglob
      - nimble test -y
      - nimble buildRelease -y
    when:
      - event: push
      - event: pull_request
      - event: tag

  package_release:
    image: alpine:3.24
    commands:
      - mkdir -p dist
      - cp build/bitbucket-rqlite-cache dist/bitbucket-rqlite-cache-linux-amd64
      - chmod +x dist/bitbucket-rqlite-cache-linux-amd64
      - sha256sum dist/bitbucket-rqlite-cache-linux-amd64 > dist/bitbucket-rqlite-cache-linux-amd64.sha256
    depends_on:
      - build
    when:
      - event: tag
        ref: refs/tags/v*

  helm:
    image: alpine/helm:3.15.4
    commands:
      - helm lint helm/bitbucket-rqlite-cache
      - >
        helm template bitbucket-rqlite-cache helm/bitbucket-rqlite-cache
        --namespace automation
        --set env.BITBUCKET_WORKSPACE=test
        --set env.BITBUCKET_USER=user@example.com
        --set env.BITBUCKET_TOKEN=app-password
        --set env.RQLITE_URL=http://rqlite:4001
      - helm package helm/bitbucket-rqlite-cache --destination build/helm
    when:
      - event: push
      - event: pull_request
      - event: tag

  publish_helm:
    image: alpine/helm:3.15.4
    commands:
      - echo "$CI_NETRC_PASSWORD" | helm registry login ghcr.io --username "$CI_NETRC_USERNAME" --password-stdin
      - helm push build/helm/*.tgz "oci://ghcr.io/$CI_REPO_OWNER/charts"
    depends_on:
      - helm
    when:
      - event: tag
        ref: refs/tags/v*

  publish_image:
    image: woodpeckerci/plugin-docker-buildx:5.2.0
    settings:
      registry: ghcr.io
      repo: ghcr.io/${CI_REPO}
      username: ${CI_NETRC_USERNAME}
      password: ${CI_NETRC_PASSWORD}
      platforms:
        - linux/amd64
        - linux/arm64
      tags:
        - ${CI_COMMIT_TAG##v}
        - ${CI_COMMIT_TAG}
        - latest
    depends_on:
      - build
    when:
      - event: tag
        ref: refs/tags/v*

  publish_release:
    image: ghcr.io/cli/cli:2.74.2
    commands:
      - GH_TOKEN="$CI_NETRC_PASSWORD" gh release create "$CI_COMMIT_TAG" dist/* --generate-notes --repo "$CI_REPO" --title "$CI_COMMIT_TAG" || GH_TOKEN="$CI_NETRC_PASSWORD" gh release upload "$CI_COMMIT_TAG" dist/* --clobber --repo "$CI_REPO"
    depends_on:
      - package_release
      - publish_helm
      - publish_image
    when:
      - event: tag
        ref: refs/tags/v*
